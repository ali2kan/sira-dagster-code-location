name: Test Base Image

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "pyproject.toml"
      - "requirements.txt"
      - "uv.lock"
      - "tests/**"
      - ".github/workflows/test.yml"
  pull_request:
    branches: [main]
    paths:
      - "Dockerfile"
      - "pyproject.toml"
      - "requirements.txt"
      - "uv.lock"
      - "tests/**"
      - ".github/workflows/test.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    #timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-flags: --debug

      - name: Check Dockerfile syntax and best practices
        run: docker buildx build --check --file Dockerfile .

      - name: Build test image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: dagster-code-location-base:test
          platforms: linux/amd64
          cache-from: |
            type=gha,scope=test-buildx
          cache-to: type=gha,mode=max,scope=test-buildx
          build-args: |
            BUILDKIT_CONTEXT_KEEP_GIT_DIR=1

      - name: Test Python environment
        run: |
          docker run --rm dagster-code-location-base:test \
            python -c "import dagster, sys; print(f'Python {sys.version}\nDagster version: {dagster.__version__}')"

      - name: Test uv availability
        run: |
          docker run --rm dagster-code-location-base:test \
            bash -c "which uv && uv --version"

      - name: Test GRPC server startup
        run: |
          set -euo pipefail
          # Create example location directory if it doesn't exist
          mkdir -p example_location
          trap 'docker rm -f test-location >/dev/null 2>&1 || true' EXIT
          # Create a simple test asset in the example location
          cat > example_location/__init__.py << 'EOF'
          from dagster import asset

          @asset
          def hello_world():
              return "Hello, World!"
          EOF

          docker run -d --name test-location \
            -v $(pwd)/example_location:/opt/dagster/app/location \
            dagster-code-location-base:test \
            dagster api grpc -h 0.0.0.0 -p 4000 -m location
          sleep 5

          if [ "$(docker inspect -f '{{.State.Running}}' test-location)" != "true" ]; then
            echo "Dagster gRPC server did not stay up"
            docker logs test-location || true
            exit 1
          fi

          docker logs test-location

      - name: Test dependency installation
        run: |
          docker run --rm dagster-code-location-base:test \
            python -c "import dagster_dlt, dagster_dbt, dagster_aws; print('All dependencies loaded successfully')"
