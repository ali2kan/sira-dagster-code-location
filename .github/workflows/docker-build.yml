name: Build and Push Docker Image

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-flags: --debug

      - name: Log in to the Container registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=stable,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=ref,event=tag
            type=sha,prefix={{branch}}-
          labels: |
            org.opencontainers.image.title=Dagster Code Location Base
            org.opencontainers.image.description=Lean base image for Dagster code locations with uv package management
            com.dagster.type=code-location-base
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      # For PRs, build only amd64 and load into Docker for verification
      - name: Build for testing (PR only)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:test
          cache-from: |
            type=gha,scope=${{ github.ref_name }}-buildx
            type=gha,scope=main-buildx
          cache-to: type=gha,mode=max,scope=${{ github.ref_name }}-buildx
          build-args: |
            BUILDKIT_CONTEXT_KEEP_GIT_DIR=1

      # For pushes to main or tags, build multi-platform and push to registry
      - name: Build and push multi-platform images
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha,scope=${{ github.ref_name }}-buildx
            type=gha,scope=main-buildx
          cache-to: type=gha,mode=max,scope=${{ github.ref_name }}-buildx
          build-args: |
            BUILDKIT_CONTEXT_KEEP_GIT_DIR=1
          provenance: true
          sbom: true
